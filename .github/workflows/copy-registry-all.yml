on:
  push:
    branches: [main]
jobs:
  copy-registry-all:
    name: Copy images to container registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v34
      - id: nix-cache-restore
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: nicknovitski/nix-develop@v1
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: just copy-registry-all
      - if: always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true'
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: ${{ steps.nix-cache-restore.outputs.primary-key }}
